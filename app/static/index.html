<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OutletSIM — Assistente</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #app {
      width: 100%;
      max-width: 720px;
      height: 100dvh;
      max-height: 820px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    header {
      background: #e63027;
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .avatar {
      width: 40px; height: 40px;
      background: rgba(255,255,255,.25);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    header h1 { font-size: 16px; font-weight: 700; }
    header p  { font-size: 12px; opacity: .85; margin-top: 1px; }

    .status-dot {
      width: 8px; height: 8px;
      background: #4ade80;
      border-radius: 50%;
      margin-left: auto;
      box-shadow: 0 0 0 2px rgba(74,222,128,.3);
    }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .msg {
      display: flex;
      gap: 8px;
      max-width: 85%;
      animation: fadeUp .2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user  { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot   { align-self: flex-start; }

    .msg-icon {
      width: 30px; height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }

    .msg.bot  .msg-icon { background: #ffeaea; }
    .msg.user .msg-icon { background: #e63027; color: #fff; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.bot  .bubble { background: #f4f4f5; border-bottom-left-radius: 4px; }
    .msg.user .bubble { background: #e63027; color: #fff; border-bottom-right-radius: 4px; }

    /* Typing indicator */
    .typing .bubble {
      display: flex; gap: 4px; align-items: center;
      padding: 12px 16px;
    }

    .dot {
      width: 7px; height: 7px;
      background: #aaa;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-5px); }
    }

    /* Suggestions */
    #suggestions {
      display: flex;
      gap: 8px;
      padding: 0 16px 12px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .chip {
      font-size: 12px;
      padding: 6px 12px;
      border: 1.5px solid #e63027;
      color: #e63027;
      border-radius: 20px;
      cursor: pointer;
      background: transparent;
      transition: all .15s;
      white-space: nowrap;
    }
    .chip:hover { background: #e63027; color: #fff; }

    /* Input */
    #input-area {
      padding: 12px 16px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #input {
      flex: 1;
      border: 1.5px solid #e0e0e0;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 14px;
      outline: none;
      resize: none;
      max-height: 120px;
      line-height: 1.4;
      font-family: inherit;
      transition: border-color .15s;
    }
    #input:focus { border-color: #e63027; }

    #send {
      width: 42px; height: 42px;
      background: #e63027;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background .15s, transform .1s;
    }
    #send:hover   { background: #c9251d; }
    #send:active  { transform: scale(.93); }
    #send:disabled { background: #ccc; cursor: not-allowed; }

    #send svg { width: 18px; height: 18px; fill: #fff; }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div class="avatar">🛍️</div>
      <div>
        <h1>OutletSIM</h1>
        <p>Assistente Virtual</p>
      </div>
      <div class="status-dot"></div>
    </header>

    <div id="messages"></div>

    <div id="suggestions">
      <button class="chip" onclick="send('Quais categorias vocês têm?')">Ver categorias</button>
      <button class="chip" onclick="send('Tem notebook disponível?')">Notebooks</button>
      <button class="chip" onclick="send('Tem impressora?')">Impressoras</button>
      <button class="chip" onclick="send('Quero consultar meu pedido')">Rastrear pedido</button>
    </div>

    <div id="input-area">
      <textarea id="input" rows="1" placeholder="Digite sua mensagem…"></textarea>
      <button id="send" onclick="submit()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl    = document.getElementById('input');
    const sendBtn    = document.getElementById('send');
    const history    = [];

    function addMsg(role, text) {
      const isBot  = role === 'bot';
      const wrap   = document.createElement('div');
      wrap.className = `msg ${role}`;
      wrap.innerHTML = `
        <div class="msg-icon">${isBot ? '🛍️' : '👤'}</div>
        <div class="bubble">${escHtml(text)}</div>
      `;
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return wrap;
    }

    function addTyping() {
      const wrap = document.createElement('div');
      wrap.className = 'msg bot typing';
      wrap.id = 'typing';
      wrap.innerHTML = `
        <div class="msg-icon">🛍️</div>
        <div class="bubble">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      `;
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTyping() {
      document.getElementById('typing')?.remove();
    }

    function escHtml(t) {
      return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
               .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
               .replace(/\n/g,'<br>');
    }

    async function send(text) {
      const msg = (text || inputEl.value).trim();
      if (!msg) return;

      inputEl.value = '';
      autoResize();
      sendBtn.disabled = true;
      addMsg('user', msg);
      addTyping();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg, history }),
        });
        const data = await res.json();
        removeTyping();

        const reply = data.response || data.detail || 'Erro ao processar resposta.';
        addMsg('bot', reply);

        history.push({ role: 'user', content: msg });
        history.push({ role: 'assistant', content: reply });

        if (history.length > 20) history.splice(0, 2);
      } catch (e) {
        removeTyping();
        addMsg('bot', 'Erro de conexão. Tente novamente.');
      }

      sendBtn.disabled = false;
      inputEl.focus();
    }

    function submit() { send(); }

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    function autoResize() {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    }
    inputEl.addEventListener('input', autoResize);

    // Mensagem de boas-vindas
    addMsg('bot', 'Olá! Sou a assistente virtual da OutletSIM. 😊\nComo posso te ajudar hoje? Pode me perguntar sobre produtos, preços, estoque ou o status do seu pedido!');
  </script>
</body>
</html>
